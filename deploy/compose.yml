name: novel-ai

services:
  postgres:
    networks:
      - novelai-net
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novelai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-DEV_DEFAULT_REMOVED}
      POSTGRES_DB: ${POSTGRES_DB:-novelai}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novelai} -d ${POSTGRES_DB:-novelai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novelai-net
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - backend
      - reader
      - frontend
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - novelai-net
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api
      BACKEND_API_URL: http://backend:8000
    networks:
      - novelai-net
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: deploy/admin.Dockerfile
    working_dir: /app/backend
    command: ["alembic", "-c", "/app/backend/alembic.ini", "upgrade", "head"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-novelai}:${POSTGRES_PASSWORD:-DEV_DEFAULT_REMOVED}@postgres:5432/${POSTGRES_DB:-novelai}}
      - PROVIDER_CREDENTIAL_ENCRYPTION_KEY=${PROVIDER_CREDENTIAL_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novelai-net
    restart: "no"

  backend:
    networks:
      - novelai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/public/catalog"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    build:
      context: ..
      dockerfile: deploy/admin.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=${ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
      - WEB_API_KEY
      - WEB_CORS_ORIGINS=${WEB_CORS_ORIGINS:-[]}
      - WEB_RATE_LIMITER_BACKEND=${WEB_RATE_LIMITER_BACKEND:-memory}
      - WEB_REQUEST_TIMEOUT_SECONDS=${WEB_REQUEST_TIMEOUT_SECONDS:-120}
      - JOB_WORKER_ENABLED=${JOB_WORKER_ENABLED:-false}
      - JOB_WORKER_POLL_SECONDS=${JOB_WORKER_POLL_SECONDS:-3}
      - NOVEL_LIBRARY_DIR=/app/storage/novel_library
      - PROVIDER_DEFAULT=${PROVIDER_DEFAULT:-gemini}
      - PROVIDER_GEMINI_API_KEY
      - PROVIDER_CREDENTIAL_ENCRYPTION_KEY=${PROVIDER_CREDENTIAL_ENCRYPTION_KEY:-}
      - PROVIDER_OPENAI_API_KEY
      - TRANSLATION_TARGET_LANGUAGE=${TRANSLATION_TARGET_LANGUAGE:-English}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:?Set SESSION_SECRET_KEY}
      - OWNER_BOOTSTRAP_SECRET=${OWNER_BOOTSTRAP_SECRET:?Set OWNER_BOOTSTRAP_SECRET}
      - PUBLIC_FRONTEND_URL=${PUBLIC_FRONTEND_URL:?Set PUBLIC_FRONTEND_URL to the public frontend origin}
      - AUTH_EMAIL_DELIVERY_MODE=${AUTH_EMAIL_DELIVERY_MODE:-noop}
      - AUTH_PASSWORD_RESET_PATH=${AUTH_PASSWORD_RESET_PATH:-/password/reset}
      - AUTH_EMAIL_VERIFICATION_PATH=${AUTH_EMAIL_VERIFICATION_PATH:-/email/verify}
      - SMTP_HOST
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME
      - SMTP_PASSWORD
      - SMTP_FROM_EMAIL
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Dokushodo}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_TIMEOUT_SECONDS=${SMTP_TIMEOUT_SECONDS:-10}
      - GOOGLE_OAUTH_CLIENT_ID
      - GOOGLE_OAUTH_CLIENT_SECRET
      - GOOGLE_OAUTH_REDIRECT_URI
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-novelai}:${POSTGRES_PASSWORD:-DEV_DEFAULT_REMOVED}@postgres:5432/${POSTGRES_DB:-novelai}}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../storage/novel_library:/app/storage/novel_library
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  reader:
    build:
      context: ..
      dockerfile: deploy/reader.Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ENV=${ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8001
      - WEB_CORS_ORIGINS=${WEB_CORS_ORIGINS:-[]}
      - NOVEL_LIBRARY_DIR=/app/storage/novel_library
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-novelai}:${POSTGRES_PASSWORD:-DEV_DEFAULT_REMOVED}@postgres:5432/${POSTGRES_DB:-novelai}}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../storage/novel_library:/app/storage/novel_library
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - novelai-net
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:

networks:
  novelai-net:
    driver: bridge
