name: novel-ai

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novelai-net
    restart: unless-stopped

  restore-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: novelai_restore
      POSTGRES_PASSWORD: ${DATABASE_RESTORE_PASSWORD:?Set DATABASE_RESTORE_PASSWORD}
      POSTGRES_DB: novelai_restore_verify
    volumes:
      - restore_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelai_restore -d novelai_restore_verify"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - novelai-net
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - backend
      - reader
      - frontend
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - novelai-net
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api
      BACKEND_API_URL: http://backend:8000
    networks:
      - novelai-net
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: deploy/admin.Dockerfile
    user: root
    working_dir: /app/backend
    entrypoint: ["alembic", "-c", "/app/backend/alembic.ini", "upgrade", "head"]
    environment:
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL}
      - DB_CONNECTION_MODE=${DB_CONNECTION_MODE:-direct}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-5}
      - DB_CONNECTION_BUDGET=${DB_CONNECTION_BUDGET:-20}
      - DB_POOL_TIMEOUT_SECONDS=${DB_POOL_TIMEOUT_SECONDS:-30}
      - DB_POOL_RECYCLE_SECONDS=${DB_POOL_RECYCLE_SECONDS:-1800}
      - DB_CONNECT_TIMEOUT_SECONDS=${DB_CONNECT_TIMEOUT_SECONDS:-10}
      - DB_SSL_MODE=${DB_SSL_MODE:-require}
      - DB_STATEMENT_TIMEOUT_MS=${DB_STATEMENT_TIMEOUT_MS:-120000}
      - DB_LOCK_TIMEOUT_MS=${DB_LOCK_TIMEOUT_MS:-10000}
      - DB_IDLE_IN_TRANSACTION_TIMEOUT_MS=${DB_IDLE_IN_TRANSACTION_TIMEOUT_MS:-60000}
      - PROVIDER_CREDENTIAL_ENCRYPTION_KEY=${PROVIDER_CREDENTIAL_ENCRYPTION_KEY:-}
    networks:
      - novelai-net
    restart: "no"

  backend:
    networks:
      - novelai-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    build:
      context: ..
      dockerfile: deploy/admin.Dockerfile
    env_file:
      - ./.env
    environment:
      - ENV=${ENV:-production}
      - SERVICE_ROLE=admin
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
      - WEB_API_KEY
      - WEB_CORS_ORIGINS=${WEB_CORS_ORIGINS:-[]}
      - WEB_RATE_LIMITER_BACKEND=${WEB_RATE_LIMITER_BACKEND:-redis}
      - WEB_REQUEST_TIMEOUT_SECONDS=${WEB_REQUEST_TIMEOUT_SECONDS:-120}
      - JOB_WORKER_ENABLED=${JOB_WORKER_ENABLED:-false}
      - JOB_WORKER_POLL_SECONDS=${JOB_WORKER_POLL_SECONDS:-3}
      - NOVEL_LIBRARY_DIR=/app/storage/novel_library
      - PROVIDER_DEFAULT=${PROVIDER_DEFAULT:-gemini}
      - PROVIDER_GEMINI_API_KEY
      - PROVIDER_CREDENTIAL_ENCRYPTION_KEY=${PROVIDER_CREDENTIAL_ENCRYPTION_KEY:-}
      - TRANSLATION_TARGET_LANGUAGE=${TRANSLATION_TARGET_LANGUAGE:-English}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-filesystem}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_KEY_PREFIX=${S3_KEY_PREFIX:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_STORAGE_LIMIT_GB=${S3_STORAGE_LIMIT_GB:-9.5}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:?Set SESSION_SECRET_KEY}
      - OWNER_BOOTSTRAP_SECRET=${OWNER_BOOTSTRAP_SECRET:?Set OWNER_BOOTSTRAP_SECRET}
      - PUBLIC_FRONTEND_URL=${PUBLIC_FRONTEND_URL:?Set PUBLIC_FRONTEND_URL to the public frontend origin}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      - AUTH_EMAIL_DELIVERY_MODE=${AUTH_EMAIL_DELIVERY_MODE:-noop}
      - AUTH_PASSWORD_RESET_PATH=${AUTH_PASSWORD_RESET_PATH:-/password/reset}
      - AUTH_EMAIL_VERIFICATION_PATH=${AUTH_EMAIL_VERIFICATION_PATH:-/email/verify}
      - SMTP_HOST
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME
      - SMTP_PASSWORD
      - SMTP_FROM_EMAIL
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Dokushodo}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_TIMEOUT_SECONDS=${SMTP_TIMEOUT_SECONDS:-10}
      - GOOGLE_OAUTH_CLIENT_ID
      - GOOGLE_OAUTH_CLIENT_SECRET
      - GOOGLE_OAUTH_REDIRECT_URI
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL}
      - DB_CONNECTION_MODE=${DB_CONNECTION_MODE:-direct}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-5}
      - DB_POOL_TIMEOUT_SECONDS=${DB_POOL_TIMEOUT_SECONDS:-30}
      - DB_POOL_RECYCLE_SECONDS=${DB_POOL_RECYCLE_SECONDS:-1800}
      - DB_CONNECT_TIMEOUT_SECONDS=${DB_CONNECT_TIMEOUT_SECONDS:-10}
      - DB_SSL_MODE=${DB_SSL_MODE:-require}
      - DB_STATEMENT_TIMEOUT_MS=${DB_STATEMENT_TIMEOUT_MS:-120000}
      - DB_LOCK_TIMEOUT_MS=${DB_LOCK_TIMEOUT_MS:-10000}
      - DB_IDLE_IN_TRANSACTION_TIMEOUT_MS=${DB_IDLE_IN_TRANSACTION_TIMEOUT_MS:-60000}
      - REDIS_URL=redis://redis:6379/0
      # M2a: Health probe settings
      - HEALTH_PROBE_TIMEOUT_MS=${HEALTH_PROBE_TIMEOUT_MS:-1000}
      - HEALTH_TOTAL_TIMEOUT_MS=${HEALTH_TOTAL_TIMEOUT_MS:-3000}
      - HEALTH_DISK_WARNING_FREE_PERCENT=${HEALTH_DISK_WARNING_FREE_PERCENT:-15}
      - HEALTH_DISK_CRITICAL_FREE_PERCENT=${HEALTH_DISK_CRITICAL_FREE_PERCENT:-5}
      # M2c: Backup settings
      - BACKUP_ENABLED=${BACKUP_ENABLED:-false}
      - BACKUP_SCHEDULE_CRON=${BACKUP_SCHEDULE_CRON:-0 2 * * *}
      - BACKUP_RETENTION_COUNT=${BACKUP_RETENTION_COUNT:-5}
      - BACKUP_MIN_SUCCESSFUL_TO_KEEP=${BACKUP_MIN_SUCCESSFUL_TO_KEEP:-3}
      - BACKUP_MAX_AGE_DAYS=${BACKUP_MAX_AGE_DAYS:-30}
      - BACKUP_S3_ENABLED=${BACKUP_S3_ENABLED:-false}
      - BACKUP_S3_ENDPOINT_URL=${BACKUP_S3_ENDPOINT_URL:-}
      - BACKUP_S3_REGION=${BACKUP_S3_REGION:-auto}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_PREFIX=${BACKUP_S3_PREFIX:-snapshots}
      - BACKUP_S3_ACCESS_KEY_ID=${BACKUP_S3_ACCESS_KEY_ID:-}
      - BACKUP_S3_SECRET_ACCESS_KEY=${BACKUP_S3_SECRET_ACCESS_KEY:-}
      - SNAPSHOT_SOURCE_S3_ACCESS_KEY_ID=${SNAPSHOT_SOURCE_S3_ACCESS_KEY_ID:-}
      - SNAPSHOT_SOURCE_S3_SECRET_ACCESS_KEY=${SNAPSHOT_SOURCE_S3_SECRET_ACCESS_KEY:-}
      - SCHEDULED_JOB_LEASE_SECONDS=${SCHEDULED_JOB_LEASE_SECONDS:-900}
      - DATABASE_BACKUP_ENABLED=${DATABASE_BACKUP_ENABLED:-false}
      - DATABASE_BACKUP_SCHEDULE_CRON=${DATABASE_BACKUP_SCHEDULE_CRON:-0 1 * * *}
      - DATABASE_BACKUP_TIMEZONE=${DATABASE_BACKUP_TIMEZONE:-UTC}
      - DATABASE_BACKUP_S3_PREFIX=${DATABASE_BACKUP_S3_PREFIX:-database}
      - DATABASE_BACKUP_RETENTION_DAYS=${DATABASE_BACKUP_RETENTION_DAYS:-30}
      - DATABASE_BACKUP_MIN_SUCCESSFUL_TO_KEEP=${DATABASE_BACKUP_MIN_SUCCESSFUL_TO_KEEP:-3}
      - DATABASE_BACKUP_ENCRYPTION_KEY=${DATABASE_BACKUP_ENCRYPTION_KEY:-}
      - DATABASE_RESTORE_VERIFICATION_ENABLED=${DATABASE_RESTORE_VERIFICATION_ENABLED:-false}
      - DATABASE_RESTORE_VERIFICATION_SCHEDULE_CRON=${DATABASE_RESTORE_VERIFICATION_SCHEDULE_CRON:-0 3 1 * *}
      - DATABASE_RESTORE_VERIFICATION_TIMEZONE=${DATABASE_RESTORE_VERIFICATION_TIMEZONE:-UTC}
      - DATABASE_RESTORE_TARGET_URL=${DATABASE_RESTORE_TARGET_URL:-}
      - DATABASE_RESTORE_SSL_MODE=${DATABASE_RESTORE_SSL_MODE:-require}
      - OPERATOR_ALERT_ENABLED=${OPERATOR_ALERT_ENABLED:-false}
      - OPERATOR_ALERT_EMAIL=${OPERATOR_ALERT_EMAIL:-}
      - OPERATOR_ALERT_FAILURE_THRESHOLD=${OPERATOR_ALERT_FAILURE_THRESHOLD:-3}
      - OPERATOR_ALERT_COOLDOWN_SECONDS=${OPERATOR_ALERT_COOLDOWN_SECONDS:-3600}
      - OPERATOR_ALERT_STALE_BACKUP_HOURS=${OPERATOR_ALERT_STALE_BACKUP_HOURS:-36}
      # M2c: Maintenance cleanup settings
      - MAINTENANCE_ENABLED=${MAINTENANCE_ENABLED:-false}
      - MAINTENANCE_DRY_RUN=${MAINTENANCE_DRY_RUN:-false}
      - MAINTENANCE_ACTIVITY_RETENTION_DAYS=${MAINTENANCE_ACTIVITY_RETENTION_DAYS:-90}
      - MAINTENANCE_FETCH_CACHE_MAX_AGE_HOURS=${MAINTENANCE_FETCH_CACHE_MAX_AGE_HOURS:-24}
      - MAINTENANCE_PIPELINE_EVENTS_MAX_AGE_DAYS=${MAINTENANCE_PIPELINE_EVENTS_MAX_AGE_DAYS:-30}
    volumes:
      - ../storage/novel_library:/app/storage/novel_library
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      restore-db:
        condition: service_healthy
    restart: unless-stopped

  reader:
    build:
      context: ..
      dockerfile: deploy/reader.Dockerfile
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health/live').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - ./.env
    environment:
      - ENV=${ENV:-production}
      - SERVICE_ROLE=reader
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8001
      - WEB_CORS_ORIGINS=${WEB_CORS_ORIGINS:-[]}
      - NOVEL_LIBRARY_DIR=/app/storage/novel_library
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL}
      - DB_CONNECTION_MODE=${DB_CONNECTION_MODE:-direct}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-5}
      - DB_POOL_TIMEOUT_SECONDS=${DB_POOL_TIMEOUT_SECONDS:-30}
      - DB_POOL_RECYCLE_SECONDS=${DB_POOL_RECYCLE_SECONDS:-1800}
      - DB_CONNECT_TIMEOUT_SECONDS=${DB_CONNECT_TIMEOUT_SECONDS:-10}
      - DB_SSL_MODE=${DB_SSL_MODE:-require}
      - DB_STATEMENT_TIMEOUT_MS=${DB_STATEMENT_TIMEOUT_MS:-120000}
      - DB_LOCK_TIMEOUT_MS=${DB_LOCK_TIMEOUT_MS:-10000}
      - DB_IDLE_IN_TRANSACTION_TIMEOUT_MS=${DB_IDLE_IN_TRANSACTION_TIMEOUT_MS:-60000}
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-filesystem}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_KEY_PREFIX=${S3_KEY_PREFIX:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_STORAGE_LIMIT_GB=${S3_STORAGE_LIMIT_GB:-9.5}
    volumes:
      - ../storage/novel_library:/app/storage/novel_library
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - novelai-net
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  restore_db_data:

networks:
  novelai-net:
    driver: bridge
