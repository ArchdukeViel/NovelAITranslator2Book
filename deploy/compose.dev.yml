# Development overrides for deploy/compose.yml
# Usage: docker compose -f compose.yml -f compose.dev.yml up -d
services:
  backend:
    volumes:
      - ../backend/src:/app/backend/src
    command: ["novelai", "web", "--reload", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    volumes:
      - ../frontend:/app/frontend
    environment:
      NODE_ENV: development
