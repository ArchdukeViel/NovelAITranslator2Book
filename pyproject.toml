[build-system]
requires = ["setuptools>=82.0.0", "wheel>=0.46.3"]
build-backend = "setuptools.build_meta"

[project]
name = "novel-ai"
version = "0.1.0"
description = "Web novel scraping, multilingual AI translation, and multi-format export platform with a Rich TUI dashboard."
authors = [
  {name = "Akmal Safari Pellu", email = "pelluakmal@gmail.com"}
]
readme = "readme.md"
requires-python = ">=3.13"
license = {text = "GPL-3.0-or-later"}

dependencies = [
  "fastapi>=0.135.1",
  "uvicorn[standard]>=0.41.0",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.13.1",
  "rich>=14.3.3",
  "python-dotenv>=1.2.2",
  "httpx>=0.28.1",
  "beautifulsoup4>=4.14.3",
  "lxml>=6.0.2",
]

[project.optional-dependencies]
openai = [
  "openai>=2.26.0",
]
test = [
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
]
dev = [
  "openai>=2.26.0",
  "pip-tools>=7.5.3",
  "pyright[nodejs]>=1.1.408",
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
]

[project.urls]
# homepage = "https://example.com"
# repository = "https://example.com/novel-ai"

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
novelaibook = "novelai.app.cli:main"
novelai = "novelai.__main__:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-p no:cacheprovider"
pythonpath = ["src"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
tmp_path_retention_policy = "none"
