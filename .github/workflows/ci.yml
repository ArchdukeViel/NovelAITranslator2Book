name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[documents,gemini,dev,test,s3,auth]"
      - run: ruff check .
      - run: pyright
      - name: Router layer violation check
        run: |
          set -e
          # No router file (except dependencies.py, which holds DI factories)
          # should import from db.models, storage.service, or sources
          violations=$(grep -rn "^from novelai\.\(db\.models\|storage\.service\|sources\.\)" \
            backend/src/novelai/api/routers/ \
            --exclude="dependencies.py" || true)
          if [ -n "$violations" ]; then
            echo "Layer violations found in routers:"
            echo "$violations"
            exit 1
          fi
          echo "No router layer violations found."

  backend-tests:
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: novelai
          POSTGRES_PASSWORD: novelai
          POSTGRES_DB: novelai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U novelai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENV: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[documents,gemini,dev,test,s3,auth]"
      - working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://novelai:novelai@localhost:5432/novelai
        run: alembic -c alembic.ini upgrade head
      - run: >
          pytest --tb=short -q -m "not e2e"
          --ignore=backend/tests/test_admin_glossary_api.py
          --ignore=backend/tests/test_auth.py
          --ignore=backend/tests/test_checkpoint_resume.py
          --ignore=backend/tests/test_glossary_prompt_injection.py
          --ignore=backend/tests/test_malformed_artifact_recovery.py
          --ignore=backend/tests/test_novel_orchestration_service.py
          --ignore=backend/tests/test_project_layout.py
          --ignore=backend/tests/test_provider_registry.py
          --ignore=backend/tests/test_public_reader_availability.py
          --ignore=backend/tests/test_translation_qa.py
          --ignore=backend/tests/test_user_data_router.py
          --ignore=backend/tests/test_web_api.py

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-check]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/admin.Dockerfile
          push: false
          tags: novelai/admin:test
          load: true
      - name: Build reader image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/reader.Dockerfile
          push: false
          tags: novelai/reader:test
          load: true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'backend/src/novelai/services/**'
              - 'backend/src/novelai/api/**'
              - 'backend/tests/e2e/**'
      - if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - if: steps.filter.outputs.relevant == 'true'
        run: pip install -e ".[documents,gemini,dev]"
      - if: steps.filter.outputs.relevant == 'true'
        run: pytest -m e2e --tb=short -q
