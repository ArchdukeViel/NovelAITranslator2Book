name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - run: pip install -e ".[documents,gemini,dev,test,s3,auth]"
      - run: ruff check .
      - run: pyright

      - name: Router layer violation check
        run: |
          set -e
          violations=$(grep -rn "^from novelai\.\(db\.models\|storage\.service\|sources\.\)" \
            backend/src/novelai/api/routers/ \
            --exclude="dependencies.py" || true)
          if [ -n "$violations" ]; then
            echo "Layer violations found in routers:"
            echo "$violations"
            exit 1
          fi
          echo "No router layer violations found."

  backend-tests:
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: novelai
          POSTGRES_PASSWORD: novelai
          POSTGRES_DB: novelai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U novelai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENV: test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - run: pip install -e ".[documents,gemini,dev,test,s3,auth]"

      - name: Bootstrap Supabase auth signature on vanilla PostgreSQL
        env:
          DATABASE_URL: postgresql://novelai:novelai@localhost:5432/novelai
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          import psycopg

          sql = Path("backend/sql/ci_vanilla_postgres_auth_compat.sql").read_text(encoding="utf-8")
          with psycopg.connect(os.environ["DATABASE_URL"]) as connection:
              connection.execute(sql)
          PY

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://novelai:novelai@localhost:5432/novelai
        run: alembic -c alembic.ini upgrade head

      - name: Run unit tests
        run: >
          pytest --basetemp=backend/tests/.tmp/pytest-core --tb=short -q -m "not e2e and not slow"
          --ignore=backend/tests/test_admin_glossary_api.py
          --ignore=backend/tests/test_auth.py
          --ignore=backend/tests/test_checkpoint_resume.py
          --ignore=backend/tests/test_document_import_orchestration.py
          --ignore=backend/tests/test_glossary_prompt_injection.py
          --ignore=backend/tests/test_glossary_sync_bridge.py
          --ignore=backend/tests/test_integration.py
          --ignore=backend/tests/test_malformed_artifact_recovery.py
          --ignore=backend/tests/test_novel_lifecycle_integration.py
          --ignore=backend/tests/test_novel_orchestration_service.py
          --ignore=backend/tests/test_project_layout.py
          --ignore=backend/tests/test_provider_registry.py
          --ignore=backend/tests/test_public_reader_availability.py
          --ignore=backend/tests/test_translation_qa.py
          --ignore=backend/tests/test_user_data_router.py
          --ignore=backend/tests/test_web_api.py

  backend-extended:
    name: Backend extended tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: backend-lint
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - shard: admin-glossary
            test_files: >-
              backend/tests/test_admin_glossary_api.py
          - shard: auth
            test_files: >-
              backend/tests/test_auth.py
          - shard: user-data
            test_files: >-
              backend/tests/test_user_data_router.py
          - shard: web-api
            test_files: >-
              backend/tests/test_web_api.py
          - shard: checkpoint-import-integration
            test_files: >-
              backend/tests/test_checkpoint_resume.py
              backend/tests/test_document_import_orchestration.py
              backend/tests/test_integration.py
          - shard: novel-lifecycle
            test_files: >-
              backend/tests/test_novel_lifecycle_integration.py
          - shard: novel-orchestration
            test_files: >-
              backend/tests/test_novel_orchestration_service.py
          - shard: glossary-provider-qa
            test_files: >-
              backend/tests/test_glossary_prompt_injection.py
              backend/tests/test_glossary_sync_bridge.py
              backend/tests/test_provider_registry.py
              backend/tests/test_translation_qa.py
          - shard: recovery-layout-reader
            test_files: >-
              backend/tests/test_malformed_artifact_recovery.py
              backend/tests/test_project_layout.py
              backend/tests/test_public_reader_availability.py
          - shard: pipeline-stages
            test_files: >-
              backend/tests/test_pipeline_stages.py
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - run: pip install -e ".[documents,gemini,dev,test,s3,auth]"
      - run: >-
          pytest --basetemp=backend/tests/.tmp/pytest-${{ matrix.shard }}
          --tb=short -q ${{ matrix.test_files }}

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-extended, frontend-check]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build admin image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/admin.Dockerfile
          push: false
          tags: novelai/admin:ci
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Build reader image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/reader.Dockerfile
          push: false
          tags: novelai/reader:ci
          cache-from: type=gha,scope=reader
          cache-to: type=gha,mode=max,scope=reader

      - name: Build frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/frontend.Dockerfile
          push: false
          tags: novelai/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-extended]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            relevant:
              - 'backend/src/novelai/services/**'
              - 'backend/src/novelai/api/**'
              - 'backend/tests/e2e/**'

      - if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - if: steps.filter.outputs.relevant == 'true'
        run: pip install -e ".[documents,gemini,dev,test,s3,auth]"

      - if: steps.filter.outputs.relevant == 'true'
        run: pytest --basetemp=backend/tests/.tmp/pytest-e2e -m e2e --tb=short -q
