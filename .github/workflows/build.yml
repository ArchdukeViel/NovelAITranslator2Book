name: Build and Push

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: admin
            dockerfile: deploy/admin.Dockerfile
            image: novelai-admin
          - service: reader
            dockerfile: deploy/reader.Dockerfile
            image: novelai-reader
          - service: frontend
            dockerfile: deploy/frontend.Dockerfile
            image: novelai-frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=sha-${{ github.event.workflow_run.head_sha }}
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == github.event.repository.default_branch }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # A failed/skipped publication must not leave a misleading green workflow.
  build-done:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    permissions: {}
    steps:
      - name: Require successful image publication
        env:
          BUILD_RESULT: ${{ needs.build-and-push.result }}
        run: |
          if [ "$BUILD_RESULT" != "success" ]; then
            echo "Image publication did not succeed: $BUILD_RESULT"
            exit 1
          fi
          echo "All images were published successfully."
