name: Build and Push

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # Gate: only run if CI passed (when triggered via workflow_run)
  check-ci:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
              echo "should-run=true" >> $GITHUB_OUTPUT
            else
              echo "should-run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should-run=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should-run == 'true'

    strategy:
      matrix:
        include:
          - service: admin
            dockerfile: deploy/admin.Dockerfile
            image: novelai-admin
          - service: reader
            dockerfile: deploy/reader.Dockerfile
            image: novelai-reader
          - service: frontend
            dockerfile: deploy/frontend.Dockerfile
            image: novelai-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Summary job so deploy.yml can depend on a single job name
  build-done:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    outputs:
      success: ${{ needs.build-and-push.result == 'success' }}
    steps:
      - run: echo "Build result ${{ needs.build-and-push.result }}"
