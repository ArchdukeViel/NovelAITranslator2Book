name: Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to deploy (e.g. latest or sha-a1b2c3)"
        required: true
        default: "latest"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: >-
      ${{
        github.event_name == 'push' && 'production' ||
        inputs.environment || 'production'
      }}

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag-trigger: use the tag name (strip leading 'v')
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "Triggered by tag push: ${GITHUB_REF_NAME}"
          else
            # Manual dispatch: use the input
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Triggered by manual dispatch: ${{ inputs.version }}"
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/novelai

            # Write the requested version into the env file so compose picks it up
            VERSION="${{ steps.version.outputs.value }}"
            echo "Deploying version: $VERSION to ${{ github.event.inputs.environment || 'production' }}"

            # Pull the exact image tags being deployed
            docker compose pull

            # Bring up with zero-downtime replacement
            docker compose up -d --remove-orphans --pull always

            # Run any pending migrations after new containers are up
            docker compose run --rm migrate

            # Prune dangling images older than 24h to reclaim disk
            docker image prune -f --filter "until=24h"

            echo "Deploy complete."